<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupiksha Travel API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #6C63FF 0%, #00D2FF 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin: 0;
        }
        p {
            color: #666;
            margin: 10px 0 0 0;
        }
        .api-info {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
            text-align: left;
        }
        code {
            background: #eee;
            padding: 5px 10px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Rupiksha Travel API</h1>
        <p>Backend server is running!</p>
        
        <div class="api-info">
            <p><strong>API Endpoints:</strong></p>
            <p><code>POST /api/auth/register</code> - Register a new user</p>
            <p><code>POST /api/auth/login</code> - Login user</p>
            <p><code>GET /api/bookings</code> - Get all bookings</p>
            <p><code>POST /api/bookings</code> - Create a new booking</p>
            
            <p style="margin-top: 15px;"><strong>Frontend:</strong></p>
            <p>Visit: <code>http://localhost:5173/</code></p>
        </div>
    </div>
</body>
</html>
